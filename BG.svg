<svg width="100%" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    .title { font-family: 'Segoe UI', 'Consolas', sans-serif; font-weight: 800; font-size: 36px; fill: #FFFFFF; }
    .sub { font-family: 'Fira Code', 'Consolas', monospace; font-size: 18px; fill: #38B2CE; font-weight: 600; }
    .desc { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #E0E0E0; }
  </style>

  <!-- 1. 底層 ACG 背景圖 (改用 Raw 直鏈，防止 GitHub Proxy 斷圖) -->
  <image href="https://raw.githubusercontent.com/KaedeNKD/KaedeNKD/main/banner.png" width="900" height="280" preserveAspectRatio="xMidYMid slice" />

  <!-- 2. 暗色漸層遮罩 -->
  <rect width="900" height="280" fill="black" opacity="0.45" />

  <!-- 4. 點陣外框裝飾線 -->
  <rect x="25" y="25" width="850" height="230" rx="8" stroke="#38B2CE" stroke-width="2" stroke-dasharray="6 6" fill="none" opacity="0.7"/>
</svg>
